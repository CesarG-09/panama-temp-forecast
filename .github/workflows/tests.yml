name: Tests

on:
  push:
    branches: [ml-pico-diario, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar y testear (captura)
        run: |
          set +e
          {
            echo "=== PIP INSTALL ==="
            pip install -r requirements.txt
            echo "PIP_EXIT=$?"
            echo "=== PYTEST ==="
            python -m pytest -v
            echo "PYTEST_EXIT=$?"
          } > ci-debug.txt 2>&1
          cat ci-debug.txt
      - name: Commit de la salida de diagnostico
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ci-debug.txt
          git commit -m "ci: salida de diagnostico [skip ci]" || echo "sin cambios"
          git push
