name: Predicción horaria

on:
  schedule:
    # Minuto :23 (no :00): GitHub descarta/retrasa los crons a la hora en punto.
    - cron: "23 11-21 * * *"   # 06:23–16:23 Panamá (UTC-5)
    # Corrida de cierre a las 11:45 Panamá: última predicción antes del corte
    # de las 12 (config.HORA_CORTE), por si el disparo de las 11:23 se pierde.
    - cron: "45 16 * * *"      # 11:45 Panamá (UTC-5)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Comparte grupo con pages.yml para no solapar despliegues al entorno github-pages.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Predecir el pico de hoy
        env:
          WUNDERGROUND_API_KEY: ${{ secrets.WUNDERGROUND_API_KEY }}
        run: python -m src.predict
      - name: Commit de la predicción
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/data.json
          git commit -m "predict: $(date -u +%Y-%m-%dT%H:%M)" || echo "Sin cambios"
          git push
      # Despliega docs/ desde el workspace actual (con el data.json recién
      # escrito), no desde el commit que disparó la corrida. Así el sitio
      # publicado refleja la predicción que se acaba de generar.
      - name: Configurar Pages
        uses: actions/configure-pages@v5
      - name: Subir artefacto del dashboard
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Desplegar en Pages
        id: deployment
        uses: actions/deploy-pages@v4
